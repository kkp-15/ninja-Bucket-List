<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やりたい事リスト（ジャンル選択＋年代別）</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2LM85GJN0L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2LM85GJN0L');
  </script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
      background-color: #f0f8ff;
    }
    h1, h2 {
      text-align: center;
    }
    form, .bucket-section, .quick-form {
      max-width: 600px;
      margin: 1rem auto;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      font-weight: bold;
    }
    input, textarea, select, button {
      padding: 0.6rem;
      font-size: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 0.5rem;
    }
    button {
      background: #007acc;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
    .item {
      background: #f9f9f9;
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      border-radius: 5px;
      position: relative;
    }
    .item.done {
      background: #d0ffd0;
    }
    .buttons {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .share-link {
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: inline-block;
    }
    .share-link a {
      color: #1d9bf0;
      text-decoration: none;
    }
    .edit-form {
      background: #eef9ff;
      padding: 0.5rem;
      border-radius: 5px;
      margin-top: 0.5rem;
    }
    .quote-box {
      text-align: center;
      font-style: italic;
      margin-bottom: 1rem;
      color: #555;
    }
    details {
      margin-bottom: 1rem;
    }
    summary {
      font-weight: bold;
      font-size: 1.1rem;
      background-color: #e0f0ff;
      padding: 0.5rem;
      border-radius: 5px;
      cursor: pointer;
    }
    #footer {
      text-align: center;
      font-size: 0.9em;
      margin-top: 40px;
      color: #555;
    }
    #footer a {
      color: #1d9bf0;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

  <!-- SEO -->
  <meta name="description" content="人生でやりたいこと100をリスト化して管理できる無料アプリ。達成チェック、カテゴリ分類、登録不要でブラウザ保存。">
  <meta property="og:title" content="バケットリスト｜やりたいこと100リスト無料アプリ">
  <meta property="og:description" content="人生でやりたいこと100をリスト化して管理できる無料アプリ。達成チェック、カテゴリ分類、登録不要でブラウザ保存。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bucket-list.kkpwebninja.com/">
  <meta property="og:image" content="https://kkpwebninja.com/card.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://bucket-list.kkpwebninja.com/">
</head>
<body>
  <h1>やりたい事リスト（ジャンル選択＋年代別）</h1>
  <div class="quote-box" id="quoteBox"></div>
  <div class="quick-form">
    <label for="quickTitle">やりたいこと（まずはこれだけでOK）</label>
    <input type="text" id="quickTitle" placeholder="例：モルディブに行く">
    <button onclick="quickAdd()">追加</button>
  </div>
  <div class="bucket-section" id="bucketList"></div>
  <div id="footer">
    X <a href="https://x.com/kkp_webninja" target="_blank">@kkp_webninja</a> <br>
    🏯 <a href="https://kkpwebninja.com" target="_blank">web忍者の本丸</a><br>
    各巻物（アプリ）の入り口は本丸ページに集めているでござる。
  </div>
  <script>
    const quoteBox = document.getElementById("quoteBox");
    const quickTitle = document.getElementById("quickTitle");
    const bucketList = document.getElementById("bucketList");
    const quotes = [
      "やりたいことは、思いついた瞬間が一番熱い。",
      "書き出すことで夢は一歩近づく。",
      "思った時がタイミング。即追加！"
    ];
    quoteBox.textContent = quotes[Math.floor(Math.random() * quotes.length)];

    let data = JSON.parse(localStorage.getItem("bucketData") || "[]");
    let editOpenIndex = null;

    function saveData() {
      localStorage.setItem("bucketData", JSON.stringify(data));
    }

    function quickAdd() {
      const title = quickTitle.value.trim();
      if (!title) return;
      data.push({ title, category: "", age: "", memo: "", done: false });
      saveData();
      quickTitle.value = "";
      render();
    }

    function render() {
      bucketList.innerHTML = "";
      const grouped = {};
      data.forEach((item, index) => {
        const decade = item.age ? Math.floor(item.age / 10) * 10 : "未分類";
        if (!grouped[decade]) grouped[decade] = [];
        grouped[decade].push({ item, index });
      });
      const sortedKeys = Object.keys(grouped).sort((a, b) => (a === "未分類" ? 1 : b === "未分類" ? -1 : a - b));
      sortedKeys.forEach((decade) => {
        const section = document.createElement("details");
        section.open = true;
        section.innerHTML = `<summary>${decade}代（${grouped[decade].length}件）</summary>`;
        grouped[decade].forEach(({ item, index }) => {
          const div = document.createElement("div");
          div.className = "item" + (item.done ? " done" : "");
          div.innerHTML = `
            <strong>${item.title}</strong><br>
            ${item.category ? `ジャンル：${item.category}<br>` : ""}
            ${item.age ? `予定年齢：${item.age}歳<br>` : ""}
            ${item.memo ? `メモ：${item.memo}<br>` : ""}
            <div class="buttons">
              <button onclick="toggleDone(${index})">${item.done ? "未達成に戻す" : "✅ 達成"}</button>
              <button onclick="showEdit(${index})">🖋 編集</button>
              <button onclick="remove(${index})">🗑 削除</button>
            </div>
            <div class="share-link" id="share${index}"></div>
            <div class="edit-form" id="edit${index}" style="display:${editOpenIndex === index ? 'block' : 'none'}">
              <label>ジャンル</label>
              <select onchange="updateField(${index}, 'category', this.value)">
                <option value="">選択してください</option>
                <option value="旅行" ${item.category === "旅行" ? "selected" : ""}>旅行</option>
                <option value="仕事" ${item.category === "仕事" ? "selected" : ""}>仕事</option>
                <option value="学び" ${item.category === "学び" ? "selected" : ""}>学び</option>
                <option value="健康" ${item.category === "健康" ? "selected" : ""}>健康</option>
                <option value="趣味" ${item.category === "趣味" ? "selected" : ""}>趣味</option>
                <option value="家族" ${item.category === "家族" ? "selected" : ""}>家族</option>
                <option value="挑戦" ${item.category === "挑戦" ? "selected" : ""}>挑戦</option>
              </select><br>
              <label>予定年齢</label>
              <input type="number" value="${item.age}" oninput="updateField(${index}, 'age', this.value)" min="0"><br>
              <label>メモ</label>
              <textarea onchange="updateField(${index}, 'memo', this.value)">${item.memo}</textarea><br>
              <button onclick="hideEdit(${index})">閉じる</button>
            </div>
          `;
          section.appendChild(div);
          renderShareLink(index);
        });
        bucketList.appendChild(section);
      });
    }

    function updateField(index, field, value) {
      data[index][field] = value;
      saveData();
      render();
      if (editOpenIndex !== null) showEdit(editOpenIndex);
    }

    function showEdit(index) {
      editOpenIndex = index;
      render();
    }

    function hideEdit(index) {
      if (editOpenIndex === index) editOpenIndex = null;
      render();
    }

    function toggleDone(index) {
      data[index].done = !data[index].done;
      saveData();
      render();
    }

    function remove(index) {
      data.splice(index, 1);
      saveData();
      render();
    }

    function renderShareLink(index) {
      const item = data[index];
      const shareDiv = document.getElementById("share" + index);
      if (!shareDiv) return;
      const text = encodeURIComponent(
        `${item.done ? `✅「${item.title}」達成！` : `📝「${item.title}」をやりたいことに追加！`}\n\n#やりたいことリスト\n#タイムバケット\nhttps://kkp-15.github.io/ninja-bucketlist/`
      );
      shareDiv.innerHTML = `<a href="https://twitter.com/intent/tweet?text=${text}" target="_blank">Xでシェア</a>`;
    }

    render();
  </script>
</body>
</html>
